# Dependabot configuration — applied by scripts/security/onboard-repo.sh
# Monitors dependencies for known vulnerabilities and outdated packages.
version: 2

updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps):"

