# Security scanning workflow for private GitHub repositories
# Applied by: scripts/security/onboard-repo.sh
#
# Runs on every push and pull request. Performs:
# - Secrets detection (gitleaks)
# - Dependency vulnerability scanning (pip-audit / npm audit)
# - Basic SAST pattern checks

name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@44c470ffc35caa219da9e1ef085d39959bfb0512  # v2.3.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan-python:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    if: hashFiles('requirements.txt') != '' || hashFiles('requirements/*.txt') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          for req in requirements.txt requirements/*.txt; do
            [ -f "$req" ] && pip-audit -r "$req" --desc on --fix --dry-run || true
          done

  dependency-scan-node:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    if: hashFiles('package-lock.json') != '' || hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high || true

  sast-patterns:
    name: Static Analysis Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Check for insecure patterns
        run: |
          ISSUES=0
          # SQL injection patterns
          if grep -rn --include="*.py" --include="*.js" --include="*.ts" \
            -E "f['\"].*SELECT.*{|\.format\(.*SELECT|execute\(.*\+.*\+" . 2>/dev/null | \
            grep -v node_modules | grep -v .venv | grep -v __pycache__; then
            echo "::warning::Potential SQL injection pattern detected"
            ISSUES=$((ISSUES + 1))
          fi
          # Hardcoded DEBUG=True
          if grep -rn --include="*.py" -E "^\s*DEBUG\s*=\s*True" . 2>/dev/null | \
            grep -v node_modules | grep -v .venv | grep -v test; then
            echo "::warning::DEBUG=True found in Python files"
            ISSUES=$((ISSUES + 1))
          fi
          echo "Found $ISSUES potential issues (non-blocking)"
